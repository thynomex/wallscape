name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install dependencies
        run: npm ci
      - name: Install libmpv development files
        shell: powershell
        run: npm run setup:mpv
      - name: Verify project
        shell: powershell
        run: |
          npm run check
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets
      - name: Build MSI
        run: npm run tauri build
      - name: Create checksums
        shell: powershell
        run: |
          $installers = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi"
          if (-not $installers) { throw "No MSI installer was produced." }
          $lines = foreach ($installer in $installers) {
            $hash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
            "$hash  $($installer.Name)"
          }
          Set-Content -Path SHA256SUMS.txt -Value $lines -Encoding utf8
      - name: Publish GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --generate-notes
          }
          gh release upload "${{ github.ref_name }}" `
            src-tauri/target/release/bundle/msi/*.msi `
            SHA256SUMS.txt `
            LICENSE `
            THIRD_PARTY_NOTICES.md `
            --repo "${{ github.repository }}" `
            --clobber
